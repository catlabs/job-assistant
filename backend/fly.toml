app = 'backend-frosty-sky-1234'
primary_region = 'ams'

[build]

[env]
  JOB_ASSISTANT_DEBUG = "false"
  JOB_ASSISTANT_HOST = "0.0.0.0"
  JOB_ASSISTANT_DATABASE_URL = "sqlite:////data/job_assistant.db"
  JOB_ASSISTANT_PROFILE_PATH = "/data/user_profile.json"
  # Local dev + deployed frontend (must match browser origin exactly, incl. https)
  JOB_ASSISTANT_CORS_ALLOW_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173,https://frontend-crimson-fire-3773.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = "data"
  destination = "/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024